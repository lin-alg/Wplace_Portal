<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wplace 导航站 | 像素互助™</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --bright-gradient: linear-gradient(135deg, #c9c92b 0%, #ffff36 100%);
            --highlight-color: #6cffd3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-main);
            scroll-behavior: smooth;
            padding-bottom: 0;
        }

        html,
        body {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        body::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
        }

        .page-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem 0 calc(3rem + 72px);
        }

        .tool-section {
            justify-content: flex-start;
        }

        .nav-section {
            justify-content: flex-start;
        }

        .hero-section {
            justify-content: space-between;
        }

        .hero-section .container {
            display: flex;
            align-items: center;
            flex: 1;
        }

        .hero-header {
            max-width: 820px;
        }

        .hero-section {
            background:
                linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)),
                url('./bg_1.png') no-repeat center center;
            background-size: cover;
        }

        .nav-section {
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('./bg_2.png') no-repeat center center;
            background-size: cover;
        }

        .tool-section {
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('./bg_3.png') no-repeat center center;
            background-size: cover;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
            width: 100%;
        }

        .nav-section .container,
        .tool-section .container {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            padding-top: 0.4rem;
        }

        header {
            text-align: left;
            margin-bottom: 1rem;
        }

        .section-header.is-revealing> :not(br) {
            opacity: 0;
            animation: textRevealIn 0.62s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .section-header.is-revealing> :not(br):nth-child(1) {
            animation-delay: 0.02s;
        }

        .section-header.is-revealing> :not(br):nth-child(2) {
            animation-delay: 0.12s;
        }

        .section-header.is-revealing> :not(br):nth-child(3) {
            animation-delay: 0.22s;
        }

        .section-header.is-revealing> :not(br):nth-child(4) {
            animation-delay: 0.32s;
        }

        .section-header.is-revealing> :not(br):nth-child(5) {
            animation-delay: 0.42s;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            background: var(--bright-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 179, 255, 0.7));
            margin-bottom: 1rem;
        }

        p.subtitle {
            font-size: 1.25rem;
            color: var(--text-main);
        }

        p.subtitle strong {
            color: var(--highlight-color);
            text-shadow: 0 0 12px rgba(240, 171, 252, 0.6);
            font-weight: 700;
        }

        .subsection-title {
            margin-top: 0;
            font-size: 1.45rem;
            letter-spacing: 0.04em;
            color: #dff4ff;
            text-transform: uppercase;
        }

        .section-desc {
            max-width: 860px;
            margin: 1rem 0 0;
            color: #d6e3f3;
            line-height: 1.7;
            font-size: 1.02rem;
        }

        .hero-tagline {
            font-size: 1.45rem;
            line-height: 1.5;
            color: #d7fff1;
            margin-top: 0.6rem;
            text-shadow: 0 0 16px rgba(44, 217, 158, 0.35);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .list-scroll-panel {
            flex: 0 0 auto;
            width: 100%;
            height: clamp(280px, 54vh, 560px);
            max-height: calc(100vh - 320px);
            overflow-y: auto;
            overflow-x: hidden;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 22px;
            background:
                linear-gradient(145deg, rgba(10, 19, 35, 0.56), rgba(8, 15, 28, 0.44));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 1.25rem;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04), 0 20px 36px rgba(0, 0, 0, 0.22);
            scrollbar-width: thin;
            scrollbar-color: rgba(111, 195, 255, 0.55) rgba(255, 255, 255, 0.08);
            margin-bottom: 0.75rem;
        }

        .list-scroll-panel::-webkit-scrollbar {
            width: 8px;
        }

        .list-scroll-panel::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.07);
            border-radius: 999px;
        }

        .list-scroll-panel::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(121, 205, 255, 0.86), rgba(56, 189, 248, 0.62));
            border-radius: 999px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .grid.is-revealing .card {
            opacity: 0;
            animation: cardRevealIn 1.3s cubic-bezier(0.22, 1, 0.36, 1) both;
            animation-delay: var(--stagger-delay, 0s);
        }

        .card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .card-content {
            position: relative;
            z-index: 1;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
        }

        .card-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .flip-wrap {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 0 1.5rem 0;
            min-height: 72px;
            cursor: pointer;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }

        .arrow-wrap-top {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 0.15rem 1.5rem 0;
            min-height: 52px;
            cursor: pointer;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }

        #flipNavWrap {
            margin-top: auto;
        }

        .nav-section .container,
        .tool-section .container {
            padding-bottom: 1rem;
        }

        .flip-wrap.is-hidden,
        .arrow-wrap-top.is-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .arrow-flip {
            border: none;
            background: transparent;
            color: #d9efff;
            font-size: 2.2rem;
            line-height: 1;
            cursor: pointer;
            text-shadow: 0 0 12px rgba(56, 189, 248, 0.6);
            transition: transform 0.25s ease, text-shadow 0.25s ease, opacity 0.25s ease;
            animation: elasticPulse 1.8s ease-in-out infinite;
            opacity: 0.95;
            pointer-events: none;
        }

        .arrow-flip:hover {
            transform: translateY(-2px) scale(1.03);
            text-shadow: 0 0 18px rgba(56, 189, 248, 0.9);
            opacity: 1;
        }

        footer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 999;
            text-align: center;
            padding: 0.9rem 1rem 1.15rem;
            background: rgba(9, 14, 22, 0.42);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-top: 1px solid var(--glass-border);
            box-shadow: 0 -8px 28px rgba(0, 0, 0, 0.25);
        }

        .footer-link {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.3);
            transition: all 0.3s ease;
            display: inline-block;
        }

        .footer-link:hover {
            color: var(--accent);
            text-shadow: 0 0 12px rgba(56, 189, 248, 0.6);
            transform: translateY(-1px);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes cardRevealIn {
            from {
                opacity: 0;
                transform: translateY(22px) scale(0.98);
                filter: blur(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes textRevealIn {
            from {
                opacity: 0;
                transform: translateY(26px);
                filter: blur(3px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @keyframes elasticPulse {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            30% {
                transform: translateY(-2px) scale(1.05, 0.96);
            }

            55% {
                transform: translateY(2px) scale(0.97, 1.04);
            }

            75% {
                transform: translateY(-1px) scale(1.02);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 3rem 1rem;
            }

            h1 {
                font-size: 2.4rem;
            }

            p.subtitle {
                font-size: 1.05rem;
            }

            .section-desc {
                font-size: 0.95rem;
            }

            .subsection-title {
                font-size: 1.2rem;
            }

            .list-scroll-panel {
                height: clamp(240px, 45vh, 420px);
                max-height: calc(100vh - 300px);
                padding: 0.95rem;
                border-radius: 16px;
                margin-bottom: 0.6rem;
            }

            .nav-section .container,
            .tool-section .container {
                padding-top: 0.35rem;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 1rem;
            }
        }
    </style>
</head>

<body>
    <section class="page-section hero-section" id="heroSection">
        <div class="container">
            <header class="section-header hero-header" id="heroHeader">
                <h1>Wplace 导航站</h1>
                <p class="hero-tagline">—— 玩转Wplace，从这里开始</p>
            </header>
        </div>

        <div class="flip-wrap" id="flipHeroWrap">
            <button id="flipHeroToNav" class="arrow-flip" type="button" aria-label="前往导航区">↓</button>
        </div>
    </section>

    <section class="page-section nav-section" id="navSection">
        <div class="arrow-wrap-top is-hidden" id="flipNavTopWrap">
            <button id="flipNavToHero" class="arrow-flip" type="button" aria-label="返回上一页">↑</button>
        </div>

        <div class="container">
            <header class="section-header" id="navHeader">
                <h2 class="subtitle">导航区</h2>
                <p class="section-desc">Wplace 实用网站入口</p>
            </header>

            <div class="list-scroll-panel" id="navListPanel">
                <div class="grid" id="navGridContainer"></div>
            </div>
        </div>

        <div class="flip-wrap is-hidden" id="flipNavWrap">
            <button id="flipNavToTool" class="arrow-flip" type="button" aria-label="前往内容区">↓</button>
        </div>
    </section>

    <section class="page-section tool-section" id="toolSection">
        <div class="arrow-wrap-top is-hidden" id="flipToolWrap">
            <button id="flipToolToNav" class="arrow-flip" type="button" aria-label="返回上一页">↑</button>
        </div>

        <div class="container">
            <header class="section-header" id="toolHeader">
                <h2 class="subtitle">工具区</h2>
                <p class="section-desc">下载优化创作体验的工具</p>
            </header>

            <div class="list-scroll-panel" id="toolListPanel">
                <div class="grid" id="toolGridContainer"></div>
            </div>
        </div>
    </section>

    <footer>
        <a href="https://github.com/lin-alg/" target="_blank" class="footer-link">
            &copy; 2026 copyright <strong>linalg</strong>. All rights reserved.
        </a>
    </footer>

    <script>
        const navLinks = [
            {
                name: "Wplace 画廊",
                desc: "一站式的Wplace作品展示及投稿平台，浏览精彩创作，获取灵感",
                url: "https://wplace-gallery.linalg.tech"
            },
            {
                name: "WPlace Analytics",
                desc: "实时排行榜与热力图分析网站，追踪中国区战况",
                url: "https://wplace-analytics.linalg.tech"
            },
            {
                name: "青海湖战况分析网站",
                desc: "可视化分析青海湖战况，提供实时数据和趋势洞察",
                url: "https://qh.wplace.icu"
            },
            {
                name: "Wplace 档案馆",
                desc: "可回溯Wplace历史绘制记录",
                url: "https://wplace.eralyon.net"
            },
            {
                name: "Wplace 像素字转换器",
                desc: "像素字转换工具，快速生成像素字",
                url: "https://wplace-pixel-text-converter.linalg.tech"
            },
            {
                name: "Wplace 颜色转换器",
                desc: "BM自带图片转模板工具",
                url: "https://pepoafonso.github.io/color_converter_wplace/zh-CN/index.html"
            },
            {
                name: "更好的 Wplace 颜色转换器",
                desc: "支持更多抖动算法",
                url: "https://wplace-color-converter.linalg.tech"
            },
            {
                name: "Wplace 骷髅打金服",
                desc: "更适合中国宝宝体质",
                url: "https://wp.1515810.xyz"
            }
        ];

        const toolLinks = [
            {
                name: "Blue Marble「BM」",
                desc: "经典永流传，建议使用v0.87.0",
                url: "https://github.com/SwingTheVine/Wplace-BlueMarble/tags"
            },
            {
                name: "Skirk Marble「SM」",
                desc: "新一代模板覆盖工具，建议使用v0.91.0",
                url: "https://github.com/Seris0/Wplace-SkirkMarble/releases"
            },
            {
                name: "一千零一夜",
                desc: "能让你在Wplace上收藏1001个点的篡改猴脚本？安装试试看！",
                url: "https://raw.githubusercontent.com/lin-alg/Wplace_Shortlink/main/%E4%B8%80%E5%8D%83%E9%9B%B6%E4%B8%80%E5%A4%9C-2.8.1.user.js"
            },
            {
                name: "这是啥阴？点开看看！",
                desc: "一个神秘的工具，能否助你在Wplace上更进一步？",
                url: "https://qm.qq.com/cgi-bin/qm/qr?k=6v8KIuAvkqP3K-44ZyX7XtgpSKplJ0Kf&jump_from=webapi&authKey=UBMFFcMNjkQkqZ/XbwoDzd9cXWH1ddPHUW21BR6Za6vhRwMhsyNfRUPWggr38O8"
            }
        ];

        const navGridContainer = document.getElementById('navGridContainer');
        const toolGridContainer = document.getElementById('toolGridContainer');
        const heroSection = document.getElementById('heroSection');
        const navSection = document.getElementById('navSection');
        const toolSection = document.getElementById('toolSection');
        const heroHeader = document.getElementById('heroHeader');
        const navHeader = document.getElementById('navHeader');
        const toolHeader = document.getElementById('toolHeader');
        const flipHeroToNav = document.getElementById('flipHeroToNav');
        const flipNavToTool = document.getElementById('flipNavToTool');
        const flipNavToHero = document.getElementById('flipNavToHero');
        const flipToolToNav = document.getElementById('flipToolToNav');
        const flipHeroWrap = document.getElementById('flipHeroWrap');
        const flipNavTopWrap = document.getElementById('flipNavTopWrap');
        const flipNavWrap = document.getElementById('flipNavWrap');
        const flipToolWrap = document.getElementById('flipToolWrap');
        const activeSectionThreshold = 0.6;
        const wheelChargeThreshold = 16;
        const panelEdgeWheelChargeThreshold = 140;
        const wheelResetDelay = 170;

        const sectionElements = {
            hero: heroSection,
            nav: navSection,
            tool: toolSection
        };

        const sectionMeta = {
            hero: {
                headers: [heroHeader],
                grids: []
            },
            nav: {
                headers: [navHeader],
                grids: [navGridContainer]
            },
            tool: {
                headers: [toolHeader],
                grids: [toolGridContainer]
            }
        };

        let activeSection = '';
        let transitionTarget = null;
        let wheelDirection = 0;
        let wheelCharge = 0;
        let wheelResetTimer = null;
        let lastWheelTime = 0;

        function renderCards(container, links, delayBase = 0) {
            container.innerHTML = '';
            links.forEach((link, index) => {
                const card = document.createElement('a');
                card.href = link.url;
                card.target = "_blank";
                card.className = 'card';
                card.style.setProperty('--stagger-delay', `${(index + delayBase) * 0.08}s`);

                card.innerHTML = `
                    <div class="card-content">
                        <div class="card-title">${link.name}</div>
                        <div class="card-desc">${link.desc || link.url}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        renderCards(navGridContainer, navLinks, 0);
        renderCards(toolGridContainer, toolLinks, 2);

        function revealCards(container) {
            container.classList.remove('is-revealing');
            void container.offsetWidth;
            container.classList.add('is-revealing');
        }

        function revealHeader(headerElement) {
            headerElement.classList.remove('is-revealing');
            void headerElement.offsetWidth;
            headerElement.classList.add('is-revealing');
        }

        function setVisibleSection(sectionName, options = {}) {
            const forceReveal = options.forceReveal === true;
            const hasChangedSection = activeSection !== sectionName;
            activeSection = sectionName;
            transitionTarget = null;
            flipHeroWrap.classList.toggle('is-hidden', sectionName !== 'hero');
            flipNavTopWrap.classList.toggle('is-hidden', sectionName !== 'nav');
            flipNavWrap.classList.toggle('is-hidden', sectionName !== 'nav');
            flipToolWrap.classList.toggle('is-hidden', sectionName !== 'tool');

            if (hasChangedSection || forceReveal) {
                const targetMeta = sectionMeta[sectionName];
                targetMeta.headers.forEach((headerElement) => {
                    revealHeader(headerElement);
                });
                targetMeta.grids.forEach((gridElement) => {
                    revealCards(gridElement);
                });
            }
        }

        function resetWheelCharge() {
            wheelDirection = 0;
            wheelCharge = 0;
            clearTimeout(wheelResetTimer);
            wheelResetTimer = null;
            lastWheelTime = 0;
        }

        function goToSection(sectionName) {
            if (transitionTarget === sectionName || activeSection === sectionName) {
                return;
            }

            transitionTarget = sectionName;
            flipHeroWrap.classList.add('is-hidden');
            flipNavTopWrap.classList.add('is-hidden');
            flipNavWrap.classList.add('is-hidden');
            flipToolWrap.classList.add('is-hidden');
            resetWheelCharge();

            sectionElements[sectionName].scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        const sectionObserver = new IntersectionObserver((entries) => {
            const visibleEntries = entries
                .filter((entry) => entry.isIntersecting)
                .sort((left, right) => right.intersectionRatio - left.intersectionRatio);

            if (!visibleEntries.length) {
                return;
            }

            const bestEntry = visibleEntries[0];
            if (bestEntry.intersectionRatio < activeSectionThreshold) {
                return;
            }

            let nextSection = 'hero';
            if (bestEntry.target.id === 'navSection') {
                nextSection = 'nav';
            }
            if (bestEntry.target.id === 'toolSection') {
                nextSection = 'tool';
            }
            setVisibleSection(nextSection);
        }, {
            threshold: [0.35, 0.5, 0.6, 0.75]
        });

        sectionObserver.observe(heroSection);
        sectionObserver.observe(navSection);
        sectionObserver.observe(toolSection);
        setVisibleSection('hero', { forceReveal: true });

        function handleWheel(event) {
            const scrollPanel = event.target.closest('.list-scroll-panel');
            let isPanelEdgeFlip = false;
            if (scrollPanel) {
                const direction = Math.sign(event.deltaY);
                const atTop = scrollPanel.scrollTop <= 0;
                const atBottom = scrollPanel.scrollTop + scrollPanel.clientHeight >= scrollPanel.scrollHeight - 1;
                const canScrollDown = direction > 0 && !atBottom;
                const canScrollUp = direction < 0 && !atTop;

                if (canScrollDown || canScrollUp) {
                    resetWheelCharge();
                    return;
                }

                if (direction > 0 && atBottom) {
                    isPanelEdgeFlip = true;
                }

                if (direction < 0 && atTop) {
                    isPanelEdgeFlip = true;
                }
            }

            event.preventDefault();

            if (transitionTarget) {
                return;
            }

            const direction = Math.sign(event.deltaY);
            if (!direction) {
                return;
            }

            const now = Date.now();
            if (direction !== wheelDirection || !lastWheelTime || now - lastWheelTime > wheelResetDelay) {
                wheelDirection = direction;
                wheelCharge = 0;
            }

            wheelCharge += Math.abs(event.deltaY);
            lastWheelTime = now;

            clearTimeout(window.__wheelFlipTimer);
            wheelResetTimer = setTimeout(() => {
                resetWheelCharge();
            }, wheelResetDelay);

            let targetSection = null;

            if (direction > 0) {
                if (activeSection === 'hero') {
                    targetSection = 'nav';
                } else if (activeSection === 'nav') {
                    targetSection = 'tool';
                }
            }

            if (direction < 0) {
                if (activeSection === 'tool') {
                    targetSection = 'nav';
                } else if (activeSection === 'nav') {
                    targetSection = 'hero';
                }
            }

            const currentThreshold = isPanelEdgeFlip ? panelEdgeWheelChargeThreshold : wheelChargeThreshold;
            if (targetSection && wheelCharge >= currentThreshold) {
                goToSection(targetSection);
            }
        }

        function scrollToNav() {
            goToSection('nav');
        }

        function scrollToTools() {
            goToSection('tool');
        }

        function scrollToHero() {
            goToSection('hero');
        }

        flipHeroToNav.addEventListener('click', scrollToNav);
        flipHeroWrap.addEventListener('click', scrollToNav);

        flipNavToTool.addEventListener('click', scrollToTools);
        flipNavWrap.addEventListener('click', scrollToTools);

        flipNavToHero.addEventListener('click', scrollToHero);
        flipNavTopWrap.addEventListener('click', scrollToHero);

        flipToolToNav.addEventListener('click', scrollToNav);
        flipToolWrap.addEventListener('click', scrollToNav);

        window.addEventListener('wheel', handleWheel, { passive: false });
    </script>
</body>

</html>
